<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Bobble Classic</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* 美しいネオングロー効果 */
        .arcade-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-3 selection:bg-blue-500 selection:text-white">

    <!-- 全体コンテナ -->
    <div class="flex flex-col md:flex-row gap-6 items-stretch justify-center max-w-4xl w-full">
        
        <!-- 左側：ステータス・スコア -->
        <div class="bg-slate-900/60 backdrop-blur border border-slate-800 rounded-2xl p-5 flex md:flex-col justify-between md:justify-start gap-4 md:w-52 shadow-2xl">
            <div class="flex md:flex-col justify-between w-full">
                <div>
                    <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">Score</div>
                    <div id="score-val" class="text-3xl font-black text-blue-400">0000</div>
                </div>
                <div class="mt-0 md:mt-4">
                    <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">High Score</div>
                    <div id="high-score-val" class="text-2xl font-bold text-slate-300">0000</div>
                </div>
            </div>
            
            <div class="border-t border-slate-800/80 my-1 hidden md:block"></div>
            
            <div class="flex md:flex-col justify-between w-full items-center md:items-start">
                <div>
                    <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">Level</div>
                    <div id="level-val" class="text-2xl font-extrabold text-emerald-400">1</div>
                </div>
                <div class="mt-0 md:mt-4 flex flex-col items-start">
                    <div class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1.5">Ceiling Drop</div>
                    <div class="flex gap-1 items-center">
                        <span id="shots-counter" class="text-lg font-bold text-orange-500 mr-2">6</span>
                        <div id="shots-dots" class="flex gap-1">
                            <!-- ドットインジケーター -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 音量・機能ボタン -->
            <button id="mute-btn" class="mt-auto hidden md:flex items-center gap-2 text-xs text-slate-400 hover:text-slate-100 bg-slate-800/50 hover:bg-slate-800 px-3 py-2 rounded-xl border border-slate-700/50 transition">
                <span id="mute-icon">🔊</span> <span id="mute-text">Sound ON</span>
            </button>
        </div>

        <!-- 中央：ゲームエリア -->
        <div class="relative bg-slate-900 border-4 border-slate-800 rounded-2xl shadow-2xl overflow-hidden max-w-full w-[360px] h-[520px] mx-auto arcade-glow">
            <canvas id="game-canvas" width="320" height="480" class="w-full h-full block bg-slate-950"></canvas>
            
            <!-- ゲーム開始・終了時のオーバーレイ画面 -->
            <div id="overlay" class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center text-center p-6 transition-all duration-300">
                <h2 id="overlay-title" class="text-3xl font-black text-blue-500 mb-2 tracking-wide">PUZZLE BOBBLE</h2>
                <p id="overlay-desc" class="text-slate-400 text-xs mb-6 max-w-[240px] leading-relaxed">
                    同じ色のバブルを3つ以上つなげて消していこう！天井が押し下がる前に全消しを狙ってください。
                </p>
                <div class="flex flex-col gap-2 w-full max-w-[200px]">
                    <button id="start-btn" class="px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 text-white font-extrabold rounded-xl shadow-lg shadow-blue-500/20 transform hover:-translate-y-0.5 transition active:translate-y-0 text-xs tracking-wide">
                        GAME START
                    </button>
                    <button id="share-btn" class="hidden px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold rounded-xl border border-slate-700 transition text-xs tracking-wide">
                        𝕏 Share Score
                    </button>
                </div>
            </div>
        </div>

        <!-- 右側：ヘルプ・コントロール -->
        <div class="bg-slate-900/60 backdrop-blur border border-slate-800 rounded-2xl p-5 flex flex-col justify-between md:w-52 text-xs text-slate-400 space-y-4 shadow-2xl">
            <div>
                <h3 class="font-bold text-slate-200 text-xs uppercase mb-2 border-b border-slate-800 pb-1.5">遊び方</h3>
                <ul class="space-y-1.5 list-disc pl-3 text-[11px]">
                    <li><span class="text-blue-400 font-bold">← / →</span> または <span class="text-blue-400 font-bold">マウス移動</span> で砲台を回転</li>
                    <li><span class="text-blue-400 font-bold">スペース</span> または <span class="text-blue-400 font-bold">クリック</span> で発射</li>
                    <li>同じ色を<span class="text-emerald-400 font-bold">3個以上</span>つなげて消去！</li>
                    <li>支えを失ったバブルは下に落ちてボーナスポイントになります。</li>
                </ul>
            </div>
            
            <div class="text-[10px] text-slate-500 leading-relaxed pt-2 border-t border-slate-800/80">
                画面端にバブルを当てると、ガイドラインに沿って綺麗に反射します。隙間を狙うショットに挑戦しましょう。
            </div>
        </div>
    </div>

    <!-- モバイル用消音ボタン（下部に表示） -->
    <button id="mute-btn-mobile" class="mt-4 md:hidden flex items-center gap-2 text-xs text-slate-400 bg-slate-900/50 px-3 py-2 rounded-xl border border-slate-800">
        🔊 Sound ON
    </button>

    <script>
        // --- サウンド生成（Web Audio API） ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = localStorage.getItem('puzzle-bobble-muted') === 'true';

        function playSound(type) {
            if (isMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.12);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now); osc.stop(now + 0.12);
            } else if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(380, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.08);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'drop') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'ceiling') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'win') {
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                const notes = [261.63, 329.63, 392.00, 523.25]; // C E G C
                notes.forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, now + i * 0.08);
                });
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.5);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        // --- ミュート管理 ---
        const muteBtn = document.getElementById('mute-btn');
        const muteBtnMobile = document.getElementById('mute-btn-mobile');
        const muteIcon = document.getElementById('mute-icon');
        const muteText = document.getElementById('mute-text');

        function updateMuteUI() {
            const label = isMuted ? '🔇 Sound OFF' : '🔊 Sound ON';
            if (muteIcon && muteText) {
                muteIcon.textContent = isMuted ? '🔇' : '🔊';
                muteText.textContent = isMuted ? 'Sound OFF' : 'Sound ON';
            }
            muteBtnMobile.textContent = label;
            localStorage.setItem('puzzle-bobble-muted', isMuted);
        }

        [muteBtn, muteBtnMobile].forEach(btn => {
            btn.addEventListener('click', () => {
                isMuted = !isMuted;
                updateMuteUI();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            });
        });
        updateMuteUI();

        // --- 基本設定とゲーム定数 ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = canvas.width;
        const CANVAS_HEIGHT = canvas.height;

        const BUBBLE_RADIUS = 18;
        const ROW_HEIGHT = Math.sqrt(3) * BUBBLE_RADIUS; // 31.17px

        const NUM_COLS_EVEN = 8;
        const NUM_COLS_ODD = 7;
        const NUM_ROWS = 14;

        const LIMIT_Y = CANVAS_HEIGHT - 100;
        const LAUNCHER_X = CANVAS_WIDTH / 2;
        const LAUNCHER_Y = CANVAS_HEIGHT - 35;

        const COLORS_MAP = {
            'red': '#ef4444',    // Rose
            'blue': '#3b82f6',   // Blue
            'green': '#10b981',  // Emerald
            'yellow': '#f59e0b', // Amber
            'purple': '#8b5cf6', // Violet
            'orange': '#f97316'  // Orange
        };
        const COLORS = Object.keys(COLORS_MAP);

        // --- ゲームステート ---
        let grid = [];
        let score = 0;
        let highScore = localStorage.getItem('puzzle-bobble-high-score') || 0;
        let currentLevel = 1;
        let shotsLeft = 6;
        let ceilingOffsetY = 0;
        let gameActive = false;

        let launcherAngle = -Math.PI / 2;
        const MIN_ANGLE = -Math.PI + 0.25;
        const MAX_ANGLE = -0.25;

        let currentBubbleColor = null;
        let nextBubbleColor = null;

        // 打ち出したバブル物理
        let isShooting = false;
        let px = 0, py = 0;
        let vx = 0, vy = 0;

        // エフェクト演出配列
        let fallingBubbles = [];
        let particles = [];

        const keys = {};

        // --- DOMのバインド ---
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');
        const shareBtn = document.getElementById('share-btn');
        const scoreVal = document.getElementById('score-val');
        const highScoreVal = document.getElementById('high-score-val');
        const levelVal = document.getElementById('level-val');
        const shotsCounter = document.getElementById('shots-counter');
        const shotsDots = document.getElementById('shots-dots');

        highScoreVal.textContent = highScore.toString().padStart(4, '0');

        // --- ヘルパー: 座標計算 ---
        function getBubbleCoords(row, col) {
            const offsetX = (row % 2 === 0) ? 0 : BUBBLE_RADIUS;
            const x = col * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS + offsetX;
            const y = row * ROW_HEIGHT + BUBBLE_RADIUS + ceilingOffsetY;
            return { x, y };
        }

        function getNeighbors(r, c) {
            const neighbors = [];
            neighbors.push({ r: r, c: c - 1 });
            neighbors.push({ r: r, c: c + 1 });
            
            if (r % 2 === 0) {
                neighbors.push({ r: r - 1, c: c - 1 });
                neighbors.push({ r: r - 1, c: c });
                neighbors.push({ r: r + 1, c: c - 1 });
                neighbors.push({ r: r + 1, c: c });
            } else {
                neighbors.push({ r: r - 1, c: c });
                neighbors.push({ r: r - 1, c: c + 1 });
                neighbors.push({ r: r + 1, c: c });
                neighbors.push({ r: r + 1, c: c + 1 });
            }
            
            return neighbors.filter(pos => {
                if (pos.r < 0 || pos.r >= NUM_ROWS) return false;
                const cols = (pos.r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                return pos.c >= 0 && pos.c < cols;
            });
        }

        // --- 破裂時の火花エフェクト生成 ---
        function createParticles(x, y, color) {
            const count = 10;
            const hexColor = COLORS_MAP[color] || '#ffffff';
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: 1.5 + Math.random() * 2,
                    color: hexColor,
                    alpha: 1,
                    decay: 0.02 + Math.random() * 0.02
                });
            }
        }

        // --- グリッド初期配置生成 ---
        function generateGrid(level) {
            grid = [];
            // レベルが高いほど初期行数を増やす (上限7行)
            const fillRows = Math.min(4 + level, 7);
            
            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                const row = [];
                for (let c = 0; c < cols; c++) {
                    if (r < fillRows) {
                        row.push(COLORS[Math.floor(Math.random() * COLORS.length)]);
                    } else {
                        row.push(null);
                    }
                }
                grid.push(row);
            }
            ceilingOffsetY = 0;
            shotsLeft = 6;
            fallingBubbles = [];
            particles = [];
            currentBubbleColor = null;
            nextBubbleColor = null;
            gameActive = true;
            prepareNextBubble();
            updateHUD();
        }

        function getColorsOnBoard() {
            const activeColors = new Set();
            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] !== null) {
                        activeColors.add(grid[r][c]);
                    }
                }
            }
            return Array.from(activeColors);
        }

        function prepareNextBubble() {
            const activeColors = getColorsOnBoard();
            if (activeColors.length === 0) {
                triggerLevelClear();
                return;
            }
            if (!currentBubbleColor) {
                currentBubbleColor = activeColors[Math.floor(Math.random() * activeColors.length)];
            } else {
                currentBubbleColor = nextBubbleColor;
            }
            nextBubbleColor = activeColors[Math.floor(Math.random() * activeColors.length)];
        }

        function updateHUD() {
            scoreVal.textContent = score.toString().padStart(4, '0');
            levelVal.textContent = currentLevel;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('puzzle-bobble-high-score', highScore);
                highScoreVal.textContent = highScore.toString().padStart(4, '0');
            }
            
            shotsCounter.textContent = shotsLeft;
            
            // バッテリーのような丸型ドットインジケーター生成
            shotsDots.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full border transition-all duration-300 ${
                    i < shotsLeft 
                        ? 'bg-orange-500 border-orange-400 shadow-sm shadow-orange-500/50' 
                        : 'bg-slate-800 border-slate-700'
                }`;
                shotsDots.appendChild(dot);
            }
        }

        // --- 衝突と吸着判定 ---
        function checkCollision() {
            if (py - BUBBLE_RADIUS <= ceilingOffsetY) return true;
            
            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] !== null) {
                        const coords = getBubbleCoords(r, c);
                        const dist = Math.hypot(px - coords.x, py - coords.y);
                        // 自然に吸い込まれるようなマージン
                        if (dist <= BUBBLE_RADIUS * 1.8) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function snapBubble() {
            // 最も近いセル情報を走査
            let targetRow = -1;
            let targetCol = -1;
            let minDistance = Infinity;

            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                for (let c = 0; c < cols; c++) {
                    const coords = getBubbleCoords(r, c);
                    const dist = Math.hypot(px - coords.x, py - coords.y);
                    if (dist < minDistance) {
                        minDistance = dist;
                        targetRow = r;
                        targetCol = c;
                    }
                }
            }

            // もし最接近セルが既に埋まっていた場合、空いている隣接セルからもっとも近い場所を選択
            if (grid[targetRow][targetCol] !== null) {
                let bestRow = -1;
                let bestCol = -1;
                let bestDist = Infinity;
                const neighbors = getNeighbors(targetRow, targetCol);
                
                for (const n of neighbors) {
                    if (grid[n.r][n.c] === null) {
                        const coords = getBubbleCoords(n.r, n.c);
                        const dist = Math.hypot(px - coords.x, py - coords.y);
                        if (dist < bestDist) {
                            bestDist = dist;
                            bestRow = n.r;
                            bestCol = n.c;
                        }
                    }
                }
                
                if (bestRow !== -1) {
                    targetRow = bestRow;
                    targetCol = bestCol;
                } else {
                    // フォールバック: 全体から空きを走査
                    let fallbackRow = -1, fallbackCol = -1, fallbackDist = Infinity;
                    for (let r = 0; r < NUM_ROWS; r++) {
                        const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                        for (let c = 0; c < cols; c++) {
                            if (grid[r][c] === null) {
                                const coords = getBubbleCoords(r, c);
                                const dist = Math.hypot(px - coords.x, py - coords.y);
                                if (dist < fallbackDist) {
                                    fallbackDist = dist;
                                    fallbackRow = r;
                                    fallbackCol = c;
                                }
                            }
                        }
                    }
                    if (fallbackRow !== -1) {
                        targetRow = fallbackRow;
                        targetCol = fallbackCol;
                    }
                }
            }

            grid[targetRow][targetCol] = currentBubbleColor;
            return { row: targetRow, col: targetCol };
        }

        // --- マッチ＆ドロップ処理 ---
        function findMatches(startRow, startCol, color) {
            const matches = [];
            const queue = [{ r: startRow, c: startCol }];
            const visited = Array.from({ length: NUM_ROWS }, (_, r) => {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                return new Array(cols).fill(false);
            });
            visited[startRow][startCol] = true;

            while (queue.length > 0) {
                const curr = queue.shift();
                matches.push(curr);

                const neighbors = getNeighbors(curr.r, curr.c);
                for (const n of neighbors) {
                    if (!visited[n.r][n.c] && grid[n.r][n.c] === color) {
                        visited[n.r][n.c] = true;
                        queue.push(n);
                    }
                }
            }
            return matches;
        }

        function dropFloating() {
            const visited = Array.from({ length: NUM_ROWS }, (_, r) => {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                return new Array(cols).fill(false);
            });
            const queue = [];

            // 最上段に接続されているバブルから探索を開始
            for (let c = 0; c < NUM_COLS_EVEN; c++) {
                if (grid[0][c] !== null) {
                    visited[0][c] = true;
                    queue.push({ r: 0, c: c });
                }
            }

            while (queue.length > 0) {
                const curr = queue.shift();
                const neighbors = getNeighbors(curr.r, curr.c);
                for (const n of neighbors) {
                    if (!visited[n.r][n.c] && grid[n.r][n.c] !== null) {
                        visited[n.r][n.c] = true;
                        queue.push(n);
                    }
                }
            }

            const dropped = [];
            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] !== null && !visited[r][c]) {
                        dropped.push({ r, c, color: grid[r][c] });
                        grid[r][c] = null;
                    }
                }
            }
            return dropped;
        }

        // --- デッドライン到達確認 ---
        function checkGameOver() {
            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] !== null) {
                        const coords = getBubbleCoords(r, c);
                        if (coords.y + BUBBLE_RADIUS >= LIMIT_Y) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function triggerGameOver() {
            playSound('lose');
            gameActive = false;
            shareBtn.classList.remove('hidden');
            showOverlay('GAME OVER', `ラインを越えてしまいました！\n到達レベル: ${currentLevel}\n最終スコア: ${score}`, 'RETRY');
        }

        function triggerLevelClear() {
            playSound('win');
            gameActive = false;
            currentLevel++;
            showOverlay('STAGE CLEAR!', `レベル ${currentLevel - 1} をクリア！\n現在のスコア: ${score}`, 'NEXT STAGE');
        }

        // --- バブル打ち出しアクション ---
        function fireBubble() {
            if (isShooting || !gameActive) return;
            playSound('shoot');
            isShooting = true;
            px = LAUNCHER_X;
            py = LAUNCHER_Y;
            vx = Math.cos(launcherAngle);
            vy = Math.sin(launcherAngle);
        }

        // --- 照準線の壁反射レイトレーシング ---
        function drawAimingLine() {
            ctx.save();
            ctx.beginPath();
            ctx.setLineDash([4, 6]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.lineWidth = 1.5;

            let curX = LAUNCHER_X;
            let curY = LAUNCHER_Y;
            let curVx = Math.cos(launcherAngle);
            let curVy = Math.sin(launcherAngle);

            ctx.moveTo(curX, curY);

            // 最大2回バウンドまでトレース
            for (let bounce = 0; bounce < 2; bounce++) {
                let tWall = Infinity;
                if (curVx < 0) {
                    tWall = (BUBBLE_RADIUS - curX) / curVx;
                } else if (curVx > 0) {
                    tWall = (CANVAS_WIDTH - BUBBLE_RADIUS - curX) / curVx;
                }

                // 天井(または天井境界)までの距離
                const tCeiling = (ceilingOffsetY + BUBBLE_RADIUS - curY) / curVy;
                const t = Math.min(tWall, tCeiling);

                if (t > 0 && t < Infinity) {
                    curX += curVx * t;
                    curY += curVy * t;
                    ctx.lineTo(curX, curY);

                    if (t === tCeiling) break; // 天井に達したら終了
                    curVx = -curVx; // 左右壁反射
                } else {
                    ctx.lineTo(curX + curVx * 150, curY + curVy * 150);
                    break;
                }
            }

            ctx.stroke();
            ctx.restore();
        }

        // --- 更新ロジック ---
        function update() {
            if (!gameActive) return;

            // 1. 落下演出のアニメ更新
            for (let i = fallingBubbles.length - 1; i >= 0; i--) {
                const fb = fallingBubbles[i];
                fb.y += fb.vy;
                fb.vy += 0.4; // 重力加速度
                if (fb.y > CANVAS_HEIGHT + BUBBLE_RADIUS) {
                    fallingBubbles.splice(i, 1);
                }
            }

            // 2. 火花パーティクル更新
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 3. キーボード方向回転
            const rotSpeed = 0.04;
            if (keys['ArrowLeft'] || keys['Left'] || keys['a']) {
                launcherAngle -= rotSpeed;
                if (launcherAngle < MIN_ANGLE) launcherAngle = MIN_ANGLE;
            }
            if (keys['ArrowRight'] || keys['Right'] || keys['d']) {
                launcherAngle += rotSpeed;
                if (launcherAngle > MAX_ANGLE) launcherAngle = MAX_ANGLE;
            }

            // 4. バブル推進処理
            if (isShooting) {
                const speed = 12;
                const steps = 4;
                let collided = false;
                let snappedCell = null;

                for (let s = 0; s < steps; s++) {
                    px += (vx * speed) / steps;
                    py += (vy * speed) / steps;

                    // 壁反射
                    if (px - BUBBLE_RADIUS < 0) {
                        px = BUBBLE_RADIUS;
                        vx = -vx;
                    } else if (px + BUBBLE_RADIUS > CANVAS_WIDTH) {
                        px = CANVAS_WIDTH - BUBBLE_RADIUS;
                        vx = -vx;
                    }

                    if (checkCollision()) {
                        collided = true;
                        snappedCell = snapBubble();
                        break;
                    }
                }

                if (collided) {
                    isShooting = false;
                    const { row, col } = snappedCell;
                    const matches = findMatches(row, col, currentBubbleColor);

                    if (matches.length >= 3) {
                        playSound('pop');
                        matches.forEach(m => {
                            const coords = getBubbleCoords(m.r, m.c);
                            createParticles(coords.x, coords.y, currentBubbleColor);
                            grid[m.r][m.c] = null;
                            score += 10;
                        });

                        // 浮遊バブルの落下
                        const dropped = dropFloating();
                        if (dropped.length > 0) {
                            playSound('drop');
                            dropped.forEach(item => {
                                const coords = getBubbleCoords(item.r, item.c);
                                fallingBubbles.push({
                                    x: coords.x,
                                    y: coords.y,
                                    vy: 1.5,
                                    color: item.color
                                });
                                score += 20; // 落下の方が高得点
                            });
                        }
                    }

                    // 射出回数カウント
                    shotsLeft--;
                    if (shotsLeft <= 0) {
                        playSound('ceiling');
                        ceilingOffsetY += ROW_HEIGHT;
                        shotsLeft = 6;
                    }

                    updateHUD();

                    if (checkGameOver()) {
                        triggerGameOver();
                        return;
                    }

                    prepareNextBubble();
                }
            }
        }

        // --- 描画ロジック ---
        function drawBubble(x, y, colorCode) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, BUBBLE_RADIUS, 0, Math.PI * 2);

            const hexColor = COLORS_MAP[colorCode] || '#475569';
            const gradient = ctx.createRadialGradient(
                x - BUBBLE_RADIUS * 0.35, 
                y - BUBBLE_RADIUS * 0.35, 
                BUBBLE_RADIUS * 0.1, 
                x, y, BUBBLE_RADIUS
            );
            
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.25, hexColor);
            gradient.addColorStop(1, '#000000');
            ctx.fillStyle = gradient;
            ctx.fill();

            // 白いハイライト
            ctx.beginPath();
            ctx.arc(x - BUBBLE_RADIUS * 0.38, y - BUBBLE_RADIUS * 0.38, BUBBLE_RADIUS * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, BUBBLE_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // グリッド線
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1;
            const size = 18;
            for (let x = 0; x < CANVAS_WIDTH; x += size) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_HEIGHT); ctx.stroke();
            }
            for (let y = 0; y < CANVAS_HEIGHT; y += size) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_WIDTH, y); ctx.stroke();
            }

            // 警告限界ライン
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.55)';
            ctx.lineWidth = 1.5;
            ctx.moveTo(0, LIMIT_Y);
            ctx.lineTo(CANVAS_WIDTH, LIMIT_Y);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = 'rgba(239, 68, 68, 0.35)';
            ctx.font = 'bold 9px monospace';
            ctx.fillText('DANGER LIMIT LINE', 10, LIMIT_Y - 5);

            // 天井押し出しビジュアル
            if (ceilingOffsetY > 0) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, ceilingOffsetY);
                ctx.beginPath();
                ctx.moveTo(0, ceilingOffsetY);
                ctx.lineTo(CANVAS_WIDTH, ceilingOffsetY);
                ctx.strokeStyle = '#ea580c';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // レーザー照準線
            if (!isShooting && gameActive) {
                drawAimingLine();
            }

            // 固定バブル
            for (let r = 0; r < NUM_ROWS; r++) {
                const cols = (r % 2 === 0) ? NUM_COLS_EVEN : NUM_COLS_ODD;
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] !== null) {
                        const coords = getBubbleCoords(r, c);
                        drawBubble(coords.x, coords.y, grid[r][c]);
                    }
                }
            }

            // 落下演出バブル
            fallingBubbles.forEach(fb => {
                drawBubble(fb.x, fb.y, fb.color);
            });

            // 火花エフェクト
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
            });

            // 推進中のバブル
            if (isShooting) {
                drawBubble(px, py, currentBubbleColor);
            }

            // 砲台ベース
            ctx.save();
            ctx.beginPath();
            ctx.arc(LAUNCHER_X, LAUNCHER_Y, 20, 0, Math.PI, true);
            ctx.fillStyle = '#1e293b';
            ctx.fill();
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.restore();

            // 砲台の筒部分
            ctx.save();
            ctx.translate(LAUNCHER_X, LAUNCHER_Y);
            ctx.rotate(launcherAngle);
            ctx.beginPath();
            ctx.moveTo(-4, 0);
            ctx.lineTo(-3, -22);
            ctx.lineTo(-7, -22);
            ctx.lineTo(0, -32);
            ctx.lineTo(7, -22);
            ctx.lineTo(3, -22);
            ctx.lineTo(4, 0);
            ctx.closePath();
            
            const gunGrad = ctx.createLinearGradient(-4, 0, 4, -32);
            gunGrad.addColorStop(0, '#3b82f6');
            gunGrad.addColorStop(1, '#60a5fa');
            ctx.fillStyle = gunGrad;
            ctx.fill();
            ctx.restore();

            // 充填中のバブル
            if (currentBubbleColor && gameActive) {
                drawBubble(LAUNCHER_X, LAUNCHER_Y, currentBubbleColor);
            }

            // ネクストバブル
            if (nextBubbleColor && gameActive) {
                ctx.fillStyle = '#64748b';
                ctx.font = 'bold 8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('NEXT', LAUNCHER_X - 55, LAUNCHER_Y + 14);
                drawBubble(LAUNCHER_X - 55, LAUNCHER_Y - 5, nextBubbleColor);
            }
        }

        // --- ループ管理 ---
        function loop() {
            update();
            draw();
            if (gameActive) {
                requestAnimationFrame(loop);
            }
        }

        // --- UI表示制御 ---
        function showOverlay(title, desc, btnText) {
            overlayTitle.textContent = title;
            overlayDesc.innerHTML = desc.replace(/\n/g, '<br>');
            startBtn.textContent = btnText;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
        }

        function hideOverlay() {
            overlay.classList.remove('flex');
            overlay.classList.add('hidden');
        }

        // --- イベント群 ---
        startBtn.addEventListener('click', () => {
            hideOverlay();
            if (startBtn.textContent === 'RETRY') {
                score = 0;
                currentLevel = 1;
            }
            generateGrid(currentLevel);
            requestAnimationFrame(loop);
        });

        // 𝕏 でのスコアシェア
        shareBtn.addEventListener('click', () => {
            const text = `Puzzle-Bobbleでスコア【${score}】を達成しました！ (Level ${currentLevel}) 🔵🔴🟢🟡\nあなたもハイスコアに挑戦してみよう！`;
            const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`;
            window.open(shareUrl, '_blank');
        });

        // キー入力
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault(); // 画面全体のスクロールを防ぐ
                fireBubble();
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // マウスによる直感的なエイム操作
        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            const angle = Math.atan2(my - LAUNCHER_Y, mx - LAUNCHER_X);
            if (angle >= MIN_ANGLE && angle <= MAX_ANGLE) {
                launcherAngle = angle;
            }
        });

        canvas.addEventListener('click', () => {
            if (gameActive) fireBubble();
        });

        // タッチ操作対応
        canvas.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (touch.clientX - rect.left) * scaleX;
            const my = (touch.clientY - rect.top) * scaleY;

            const angle = Math.atan2(my - LAUNCHER_Y, mx - LAUNCHER_X);
            if (angle >= MIN_ANGLE && angle <= MAX_ANGLE) {
                launcherAngle = angle;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            fireBubble();
        }, { passive: false });
    </script>
</body>
